<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Dashboard — StoneForge</title>
  <link rel="stylesheet" href="tokens.css">
  <link rel="stylesheet" href="base.css">
  <link rel="stylesheet" href="nav.css">
  <style>
    body {
      background: var(--clr-bg);
      min-height: 100svh;
      overflow-x: hidden;
    }

    /* ---- Page layout ---- */
    .dashboard {
      max-width: var(--max-width);
      margin: 0 auto;
      padding: calc(var(--nav-height) + 2.5rem) 2rem 4rem;
    }

    /* ---- Loading state ---- */
    .loading-screen {
      position: fixed;
      inset: 0;
      background: var(--clr-bg);
      display: flex;
      align-items: center;
      justify-content: center;
      flex-direction: column;
      gap: 1rem;
      z-index: 999;
    }

    .loading-spinner {
      width: 40px;
      height: 40px;
      border: 3px solid rgba(255,255,255,0.1);
      border-top-color: var(--clr-orange);
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }

    @keyframes spin { to { transform: rotate(360deg); } }

    .loading-screen p {
      color: var(--clr-text-muted);
      font-family: var(--font-ui);
      font-size: 0.9rem;
    }

    /* ---- Profile header ---- */
    .profile-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 2rem;
      background: var(--clr-surface);
      border: 1px solid var(--clr-border);
      border-radius: var(--radius-xl);
      padding: 2rem 2.5rem;
      margin-bottom: 2rem;
      flex-wrap: wrap;
    }

    .profile-header__left {
      display: flex;
      align-items: center;
      gap: 1.5rem;
    }

    .profile-avatar {
      width: 72px;
      height: 72px;
      border-radius: 50%;
      background: linear-gradient(135deg, var(--clr-orange-dim), var(--clr-green-dim));
      border: 2px solid var(--clr-border);
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: var(--font-display);
      font-size: 2rem;
      color: var(--clr-green-light);
      flex-shrink: 0;
    }

    .profile-info__name {
      font-family: var(--font-display);
      font-size: 1.8rem;
      color: var(--clr-white);
      line-height: 1.1;
    }

    .profile-info__meta {
      font-size: 0.82rem;
      color: var(--clr-text-dim);
      font-family: var(--font-ui);
      margin-top: 0.25rem;
    }

    .profile-info__id {
      font-size: 0.78rem;
      color: var(--clr-text-dim);
      font-family: var(--font-body);
      margin-top: 0.2rem;
    }

    .btn-logout {
      background: rgba(239,68,68,0.1);
      border: 1px solid rgba(239,68,68,0.25);
      color: #fca5a5;
      padding: 0.55rem 1.25rem;
      border-radius: 8px;
      font-family: var(--font-ui);
      font-size: 0.88rem;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.15s ease;
    }
    .btn-logout:hover { background: rgba(239,68,68,0.2); }

    /* ---- Dashboard grid ---- */
    .dashboard-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 1.25rem;
      margin-bottom: 2rem;
    }

    /* ---- Cards ---- */
    .card {
      background: var(--clr-surface);
      border: 1px solid var(--clr-border);
      border-radius: var(--radius-lg);
      padding: 1.5rem;
      transition: border-color 0.2s ease;
    }
    .card:hover { border-color: var(--clr-border-hover); }

    .card--wide {
      grid-column: span 2;
    }

    .card--full {
      grid-column: span 3;
    }

    .card__title {
      font-family: var(--font-ui);
      font-size: 0.72rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.1em;
      color: var(--clr-text-dim);
      margin-bottom: 1.25rem;
      display: flex;
      align-items: center;
      gap: 0.5rem;
    }

    /* ---- Stats ---- */
    .stats-list {
      display: flex;
      flex-direction: column;
      gap: 0.75rem;
    }

    .stat-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0.6rem 0.75rem;
      background: rgba(255,255,255,0.03);
      border-radius: 6px;
    }

    .stat-row__name {
      font-size: 0.88rem;
      color: var(--clr-text-muted);
      font-family: var(--font-ui);
    }

    .stat-row__value {
      font-family: var(--font-display);
      font-size: 1.2rem;
      color: var(--clr-orange-light);
    }

    .stat-empty {
      font-size: 0.85rem;
      color: var(--clr-text-dim);
      text-align: center;
      padding: 1.5rem 0;
      font-family: var(--font-ui);
    }

    /* ---- Inventory ---- */
    .inventory-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(120px, 1fr));
      gap: 0.75rem;
    }

    .inventory-item {
      background: rgba(255,255,255,0.03);
      border: 1px solid var(--clr-border);
      border-radius: 8px;
      padding: 1rem 0.75rem;
      text-align: center;
      transition: border-color 0.15s ease, background 0.15s ease;
    }

    .inventory-item:hover {
      border-color: var(--clr-border-hover);
      background: rgba(255,255,255,0.05);
    }

    .inventory-item__icon {
      font-size: 1.8rem;
      margin-bottom: 0.4rem;
    }

    .inventory-item__name {
      font-size: 0.78rem;
      color: var(--clr-text-muted);
      font-family: var(--font-ui);
      font-weight: 600;
      word-break: break-word;
    }

    .inventory-item__qty {
      font-size: 0.72rem;
      color: var(--clr-text-dim);
      margin-top: 0.2rem;
    }

    /* ---- Currency ---- */
    .currency-list {
      display: flex;
      gap: 1rem;
      flex-wrap: wrap;
    }

    .currency-chip {
      display: flex;
      align-items: center;
      gap: 0.5rem;
      background: rgba(217,119,6,0.1);
      border: 1px solid rgba(217,119,6,0.2);
      border-radius: var(--radius-pill);
      padding: 0.4rem 1rem;
    }

    .currency-chip__code {
      font-size: 0.75rem;
      font-weight: 700;
      color: var(--clr-orange-light);
      font-family: var(--font-ui);
      text-transform: uppercase;
    }

    .currency-chip__amount {
      font-family: var(--font-display);
      font-size: 1.1rem;
      color: var(--clr-white);
    }

    /* ---- Error state ---- */
    .error-banner {
      background: rgba(239,68,68,0.08);
      border: 1px solid rgba(239,68,68,0.2);
      border-radius: 10px;
      padding: 1rem 1.5rem;
      color: #fca5a5;
      font-size: 0.9rem;
      font-family: var(--font-ui);
      margin-bottom: 1.5rem;
      display: none;
    }

    .skeleton {
      background: linear-gradient(90deg, rgba(255,255,255,0.04) 25%, rgba(255,255,255,0.08) 50%, rgba(255,255,255,0.04) 75%);
      background-size: 400% 100%;
      animation: shimmer 1.5s infinite;
      border-radius: 4px;
      height: 1rem;
    }

    @keyframes shimmer {
      0% { background-position: 100% 0; }
      100% { background-position: -100% 0; }
    }

    /* ---- Responsive ---- */
    @media (max-width: 900px) {
      .dashboard-grid { grid-template-columns: 1fr 1fr; }
      .card--wide, .card--full { grid-column: span 2; }
    }

    @media (max-width: 600px) {
      .dashboard-grid { grid-template-columns: 1fr; }
      .card--wide, .card--full { grid-column: span 1; }
      .profile-header { flex-direction: column; align-items: flex-start; }
    }
  </style>
</head>
<body>

  <!-- Loading screen -->
  <div class="loading-screen" id="loading-screen">
    <div class="loading-spinner"></div>
    <p>Loading your profile...</p>
  </div>

  <!-- Nav -->
  <div class="nav__overlay" id="nav-overlay"></div>
  <header>
    <nav class="nav" id="main-nav">
      <div class="nav__inner">
        <a href="index.html" class="nav__logo">
          <img src="Assets/logo-transparent.png" alt="StoneForge" class="nav__logo-img">
          <span class="nav__logo-text">StoneForge</span>
        </a>
        <button class="nav__burger" id="burger" aria-label="Toggle menu">
          <span></span><span></span><span></span>
        </button>
        <ul class="nav__links" id="nav-links">
          <li class="nav__sidebar-brand">
            <img src="Assets/logo-transparent.png" alt="StoneForge" class="nav__sidebar-brand-img">
            <span class="nav__sidebar-brand-text">StoneForge</span>
          </li>
          <li><a href="index.html" class="nav__link">Home</a></li>
          <li><a href="index.html#about" class="nav__link">About</a></li>
          <li><a href="index.html#features" class="nav__link">Features</a></li>
          <li><a href="download.html" class="nav__link">Download</a></li>
          <li id="nav-auth-item">
          <a href="login-page.html"><button class="nav__cta">Sign In</button></a></li>
        </ul>
      </div>
    </nav>
  </header>

  <!-- Dashboard content -->
  <div class="dashboard" id="dashboard" style="display:none;">

    <div class="error-banner" id="error-banner"></div>

    <!-- Profile header -->
    <div class="profile-header">
      <div class="profile-header__left">
        <div class="profile-avatar" id="avatar-initials">?</div>
        <div class="profile-info">
          <div class="profile-info__name" id="display-name">—</div>
          <div class="profile-info__meta" id="account-created">—</div>
          <div class="profile-info__id" id="playfab-id">—</div>
        </div>
      </div>
      <button class="btn-logout" id="logout-btn">Sign Out</button>
    </div>

    <!-- Cards grid -->
    <div class="dashboard-grid">

      <!-- Virtual Currency -->
      <div class="card">
        <div class="card__title">💰 Virtual Currency</div>
        <div class="currency-list" id="currency-list">
          <div class="skeleton" style="width:120px; height:2rem;"></div>
        </div>
      </div>

      <!-- Stats -->
      <div class="card card--wide">
        <div class="card__title">📊 Player Statistics</div>
        <div class="stats-list" id="stats-list">
          <div class="skeleton" style="margin-bottom:0.5rem;"></div>
          <div class="skeleton" style="margin-bottom:0.5rem; width:80%;"></div>
          <div class="skeleton" style="width:60%;"></div>
        </div>
      </div>

      <!-- Inventory -->
      <div class="card card--full">
        <div class="card__title">🎒 Inventory</div>
        <div class="inventory-grid" id="inventory-grid">
          <div class="skeleton" style="height:5rem;"></div>
          <div class="skeleton" style="height:5rem;"></div>
          <div class="skeleton" style="height:5rem;"></div>
        </div>
      </div>

    </div>
  </div>

  <script src="StoneForge.js"></script>
  <script src="dashboard.js"></script>
</body>
</html>
